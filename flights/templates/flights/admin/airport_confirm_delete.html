{% extends 'base_generic.html' %}
{% block content %}
  <h2>Supprimer le vol {{ object.id }}</h2>
  <p>Confirmez-vous la suppression ?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit">Oui, supprimer</button>
    <a href="{% url 'flights:admin_dashboard' %}">Annuler</a>
  </form>
{% endblock %}
