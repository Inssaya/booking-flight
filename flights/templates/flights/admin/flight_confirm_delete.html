{% extends 'base_generic.html' %}
{% block content %}
  <h2>Supprimer le vol {{ object.id }}</h2>
  <p>Voulez-vous vraiment supprimer ce vol ?</p>
  <form method="post">
    {% csrf_token %}
    <button type="submit">Oui, supprimer</button>
    <a href="{% url 'flights:admin_dashboard' %}">Non, revenir au dashboard</a>
  </form>
{% endblock %}
